<!DOCTYPE html>
<html>
<head>
<title>Verification Result</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="main-container">

{% if result == "valid" %}

<h1 class="title text-success">✔ Signature Valid</h1>

<p class="subtitle">
The document is authentic and has not been modified.
</p>

{% else %}

<h1 class="title text-danger">✖ Signature Invalid</h1>

<p class="subtitle">
The document has been modified or the signature is incorrect.
</p>

{% endif %}

<div class="card-box text-center">

<p>Verification completed.</p>

</div>

<div class="mt-4">

<a href="/verify" class="btn btn-primary">Verify Another File</a>

<a href="/" class="btn btn-light back-btn">
⬅ Back to Home
</a>

</div>

</div>

</body>
</html>
