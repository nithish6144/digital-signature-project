<!DOCTYPE html>
<html>
<head>
<title>Verify Signature</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="main-container">

<div class="text-center mb-4">

<h1 class="title">✅ Verify Digital Signature</h1>

<p class="subtitle">
Upload the document and its signature file to verify authenticity
</p>

</div>

<div class="card-box">

<form method="POST" enctype="multipart/form-data">

<label class="mb-2">Document</label>
<input type="file" name="file" class="form-control mb-3" required>

<label class="mb-2">Signature File (.sig)</label>
<input type="file" name="signature" class="form-control mb-4" required>

<button class="btn btn-primary btn-lg w-100">
Verify Signature
</button>

</form>

</div>

<div class="text-center mt-4">

<a href="/" class="btn btn-light back-btn">
⬅ Back to Home
</a>

</div>

</div>

</body>
</html>
